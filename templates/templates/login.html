<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Okudio — Giris</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:#F8F9FA;min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{background:#fff;border:1px solid #DEE2E6;border-radius:16px;padding:36px;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.logo{text-align:center;margin-bottom:20px}.logo-icon{width:50px;height:50px;background:#228BE6;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;font-size:24px;color:#fff;margin-bottom:8px}
h1{font-family:'DM Serif Display';font-size:20px;text-align:center;margin-bottom:2px}.sub{text-align:center;font-size:12px;color:#868E96;margin-bottom:24px}
label{display:block;font-size:10px;font-weight:600;color:#868E96;margin-bottom:3px;text-transform:uppercase}
input{width:100%;padding:9px 12px;border:1px solid #DEE2E6;border-radius:7px;font:13px 'DM Sans';background:#F1F3F5;margin-bottom:14px}input:focus{outline:none;border-color:#228BE6;background:#fff}
button{width:100%;padding:10px;background:#228BE6;color:#fff;border:none;border-radius:7px;font:14px/1 'DM Sans';font-weight:600;cursor:pointer}button:hover{background:#1C7ED6}
.flash{padding:8px;border-radius:6px;font-size:11px;margin-bottom:12px;text-align:center}.flash-error{background:#FFF5F5;color:#C92A2A;border:1px solid #FFC9C9}
</style>
</head>
<body>
<div class="box">
<div class="logo"><div class="logo-icon">📚</div><h1>Okudio</h1><div class="sub">Okuma Dedektifi</div></div>
{% with messages = get_flashed_messages(with_categories=true) %}{% for cat, msg in messages %}<div class="flash flash-{{ cat }}">{{ msg }}</div>{% endfor %}{% endwith %}
<form method="POST"><label>Kullanici Adi</label><input name="username" required autofocus><label>Sifre</label><input name="password" type="password" required><button type="submit">Giris Yap</button></form>
</div>
</body>
</html>
