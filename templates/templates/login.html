<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Okudio — Giris</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:#F8F9FA;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border:1px solid #DEE2E6;border-radius:16px;padding:40px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.logo{text-align:center;margin-bottom:24px}.logo-icon{width:56px;height:56px;background:#228BE6;border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;color:#fff;margin-bottom:10px}
h1{font-family:'DM Serif Display',serif;font-size:22px;text-align:center;margin-bottom:4px}
.sub{text-align:center;font-size:13px;color:#868E96;margin-bottom:28px}
label{display:block;font-size:11px;font-weight:600;color:#868E96;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
input{width:100%;padding:10px 14px;border:1px solid #DEE2E6;border-radius:8px;font:14px 'DM Sans',sans-serif;background:#F1F3F5;margin-bottom:16px}input:focus{outline:none;border-color:#228BE6;background:#fff}
button{width:100%;padding:12px;background:#228BE6;color:#fff;border:none;border-radius:8px;font:15px/1 'DM Sans',sans-serif;font-weight:600;cursor:pointer}button:hover{background:#1C7ED6}
.flash{padding:10px;border-radius:8px;font-size:13px;margin-bottom:16px;text-align:center}.flash-error{background:#FFF5F5;color:#C92A2A;border:1px solid #FFC9C9}
</style>
</head>
<body>
<div class="login-box">
<div class="logo"><div class="logo-icon">📚</div><h1>Okudio</h1><div class="sub">Okuma Dedektifi</div></div>
{% with messages = get_flashed_messages(with_categories=true) %}{% for cat, msg in messages %}<div class="flash flash-{{ cat }}">{{ msg }}</div>{% endfor %}{% endwith %}
<form method="POST">
<label>Kullanici Adi</label><input name="username" required autofocus>
<label>Sifre</label><input name="password" type="password" required>
<button type="submit">Giris Yap</button>
</form>
</div>
</body>
</html>
